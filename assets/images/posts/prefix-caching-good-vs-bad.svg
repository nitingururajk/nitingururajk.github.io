<svg width="900" height="1080" viewBox="0 0 900 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0c0c10"/>
    </linearGradient>
    <linearGradient id="redPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="bluePill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="greenPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2dd4a0" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="amberPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="vsGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c5cfc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2dd4a0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="1080" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="1078" rx="23" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="52" fill="#f0f0f3" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" text-anchor="middle">Same fields, different order</text>
  <text x="450" y="80" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="15" text-anchor="middle">Top: timestamp first breaks reuse. Bottom: stable prefix stays cacheable.</text>

  <!-- ============================================ -->
  <!-- TOP: BAD                                     -->
  <!-- ============================================ -->
  <rect x="48" y="116" width="804" height="410" rx="16" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>

  <!-- Bad header -->
  <text x="450" y="162" fill="#fca5a5" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Bad order: dynamic value first</text>

  <!-- Bad: All pills on one row -->
  <rect x="80" y="194" width="105" height="44" rx="22" fill="url(#redPill)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <rect x="195" y="194" width="140" height="44" rx="22" fill="url(#bluePill)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <rect x="345" y="194" width="125" height="44" rx="22" fill="url(#bluePill)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <rect x="480" y="194" width="95" height="44" rx="22" fill="url(#bluePill)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <rect x="585" y="194" width="75" height="44" rx="22" fill="url(#bluePill)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <rect x="670" y="194" width="105" height="44" rx="22" fill="url(#redPill)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>

  <text x="132" y="222" fill="#fca5a5" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">timestamp</text>
  <text x="265" y="222" fill="#93c5fd" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">system prompt</text>
  <text x="407" y="222" fill="#93c5fd" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">instructions</text>
  <text x="527" y="222" fill="#93c5fd" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">context</text>
  <text x="622" y="222" fill="#93c5fd" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">docs</text>
  <text x="722" y="222" fill="#fca5a5" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">question</text>

  <!-- Bad: Result badge -->
  <rect x="100" y="262" width="280" height="50" rx="25" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <circle cx="132" cy="287" r="8" fill="#ef4444" opacity="0.6"/>
  <text x="154" y="293" fill="#fca5a5" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="700">Miss from token one</text>

  <!-- Bad: Code block -->
  <rect x="100" y="338" width="700" height="152" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <text x="128" y="370" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" opacity="0.7">Current timestamp: 2026-03-08T12:34:56Z</text>
  <text x="128" y="398" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">You are an assistant for support triage.</text>
  <text x="128" y="426" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">Here is the policy manual...</text>
  <text x="128" y="454" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">User question: ...</text>

  <!-- Bad: annotation -->
  <text x="128" y="478" fill="#ef4444" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" opacity="0.6">&#x2191; Dynamic value at line 1 breaks the prefix</text>

  <!-- ============================================ -->
  <!-- VS DIVIDER                                   -->
  <!-- ============================================ -->
  <line x1="100" y1="556" x2="800" y2="556" stroke="url(#vsGradient)" stroke-width="1.5"/>
  <rect x="400" y="534" width="100" height="44" rx="22" fill="#111118"/>
  <rect x="400" y="534" width="100" height="44" rx="22" fill="none" stroke="rgba(124,92,252,0.3)" stroke-width="1"/>
  <text x="450" y="563" fill="#a78bfa" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="800" text-anchor="middle">VS</text>

  <!-- ============================================ -->
  <!-- BOTTOM: GOOD                                 -->
  <!-- ============================================ -->
  <rect x="48" y="600" width="804" height="450" rx="16" fill="rgba(45,212,160,0.03)" stroke="rgba(45,212,160,0.12)" stroke-width="1"/>

  <!-- Good header -->
  <text x="450" y="646" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Good order: stable prefix first</text>

  <!-- Shared prefix bracket (above pills) -->
  <text x="312" y="680" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" opacity="0.5">SHARED PREFIX</text>
  <line x1="80" y1="690" x2="545" y2="690" stroke="#5eead4" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="80" y1="686" x2="80" y2="696" stroke="#5eead4" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="545" y1="686" x2="545" y2="696" stroke="#5eead4" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Good: All pills on one row -->
  <rect x="80" y="706" width="140" height="44" rx="22" fill="url(#greenPill)" stroke="rgba(45,212,160,0.3)" stroke-width="1"/>
  <rect x="230" y="706" width="125" height="44" rx="22" fill="url(#greenPill)" stroke="rgba(45,212,160,0.3)" stroke-width="1"/>
  <rect x="365" y="706" width="95" height="44" rx="22" fill="url(#greenPill)" stroke="rgba(45,212,160,0.3)" stroke-width="1"/>
  <rect x="470" y="706" width="75" height="44" rx="22" fill="url(#greenPill)" stroke="rgba(45,212,160,0.3)" stroke-width="1"/>
  <rect x="565" y="706" width="105" height="44" rx="22" fill="url(#amberPill)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <rect x="680" y="706" width="105" height="44" rx="22" fill="url(#amberPill)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>

  <text x="150" y="734" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">system prompt</text>
  <text x="292" y="734" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">instructions</text>
  <text x="412" y="734" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">context</text>
  <text x="507" y="734" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">docs</text>
  <text x="617" y="734" fill="#fcd34d" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">timestamp</text>
  <text x="732" y="734" fill="#fcd34d" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">question</text>

  <!-- Good: Result badge -->
  <rect x="100" y="774" width="320" height="50" rx="25" fill="rgba(45,212,160,0.1)" stroke="rgba(45,212,160,0.25)" stroke-width="1"/>
  <circle cx="132" cy="799" r="8" fill="#2dd4a0" opacity="0.6"/>
  <text x="154" y="805" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="700">Stable prefix can be reused</text>

  <!-- Good: Code block -->
  <rect x="100" y="850" width="700" height="152" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(45,212,160,0.1)" stroke-width="1"/>
  <text x="128" y="882" fill="#5eead4" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" opacity="0.7">You are an assistant for support triage.</text>
  <text x="128" y="910" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">Here is the policy manual...</text>
  <text x="128" y="938" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">Current timestamp: 2026-03-08T12:34:56Z</text>
  <text x="128" y="966" fill="#65657a" font-family="'JetBrains Mono', monospace" font-size="14">User question: ...</text>

  <!-- Good: annotation -->
  <text x="128" y="990" fill="#2dd4a0" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" opacity="0.6">&#x2191; Stable lines first &#x2192; long reusable prefix</text>
</svg>
