<svg width="1400" height="700" viewBox="0 0 1400 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0c0c10"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(45,212,160,0.10)"/>
      <stop offset="100%" stop-color="rgba(45,212,160,0.03)"/>
    </linearGradient>
    <linearGradient id="amberCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(251,146,60,0.10)"/>
      <stop offset="100%" stop-color="rgba(251,146,60,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="700" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="698" rx="23" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Title -->
  <text x="700" y="58" fill="#f0f0f3" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Cached blocks first, live tail last</text>
  <text x="700" y="88" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="17" text-anchor="middle">Blocks 1 to 3 are reusable prefix blocks; block 4 is request-specific.</text>

  <!-- Block 1 -->
  <rect x="68" y="140" width="280" height="310" rx="16" fill="url(#greenCard)" stroke="rgba(45,212,160,0.2)" stroke-width="1"/>
  <text x="208" y="178" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.14em" text-anchor="middle">BLOCK 1</text>
  <text x="208" y="216" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" text-anchor="middle">Cached</text>
  <rect x="108" y="242" width="200" height="1" rx="1" fill="rgba(45,212,160,0.15)"/>
  <text x="208" y="278" fill="#a0a0b0" font-family="Inter, -apple-system, sans-serif" font-size="17" text-anchor="middle">system + policy</text>
  <text x="208" y="330" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">Already materialized</text>
  <text x="208" y="352" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">in KV cache</text>

  <!-- Arrow 1→2 -->
  <path d="M358 295 L390 295" stroke="rgba(124,92,252,0.4)" stroke-width="2"/>
  <path d="M384 289 L396 295 L384 301" fill="rgba(124,92,252,0.4)"/>

  <!-- Block 2 -->
  <rect x="400" y="140" width="280" height="310" rx="16" fill="url(#greenCard)" stroke="rgba(45,212,160,0.2)" stroke-width="1"/>
  <text x="540" y="178" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.14em" text-anchor="middle">BLOCK 2</text>
  <text x="540" y="216" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" text-anchor="middle">Cached</text>
  <rect x="440" y="242" width="200" height="1" rx="1" fill="rgba(45,212,160,0.15)"/>
  <text x="540" y="278" fill="#a0a0b0" font-family="Inter, -apple-system, sans-serif" font-size="17" text-anchor="middle">retrieved context</text>
  <text x="540" y="330" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">Reusable across</text>
  <text x="540" y="352" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">similar requests</text>

  <!-- Arrow 2→3 -->
  <path d="M690 295 L722 295" stroke="rgba(124,92,252,0.4)" stroke-width="2"/>
  <path d="M716 289 L728 295 L716 301" fill="rgba(124,92,252,0.4)"/>

  <!-- Block 3 -->
  <rect x="732" y="140" width="280" height="310" rx="16" fill="url(#greenCard)" stroke="rgba(45,212,160,0.2)" stroke-width="1"/>
  <text x="872" y="178" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.14em" text-anchor="middle">BLOCK 3</text>
  <text x="872" y="216" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" text-anchor="middle">Cached</text>
  <rect x="772" y="242" width="200" height="1" rx="1" fill="rgba(45,212,160,0.15)"/>
  <text x="872" y="278" fill="#a0a0b0" font-family="Inter, -apple-system, sans-serif" font-size="17" text-anchor="middle">few-shot examples</text>
  <text x="872" y="330" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">Still valid while</text>
  <text x="872" y="352" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">memory holds</text>

  <!-- Arrow 3→4 -->
  <path d="M1022 295 L1054 295" stroke="rgba(124,92,252,0.4)" stroke-width="2"/>
  <path d="M1048 289 L1060 295 L1048 301" fill="rgba(124,92,252,0.4)"/>

  <!-- Block 4 (live) -->
  <rect x="1064" y="140" width="280" height="310" rx="16" fill="url(#amberCard)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="1204" y="178" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.14em" text-anchor="middle">BLOCK 4</text>
  <text x="1204" y="216" fill="#fdba74" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="800" text-anchor="middle">Live only</text>
  <rect x="1104" y="242" width="200" height="1" rx="1" fill="rgba(251,146,60,0.15)"/>
  <text x="1204" y="278" fill="#a0a0b0" font-family="Inter, -apple-system, sans-serif" font-size="17" text-anchor="middle">question tail</text>
  <text x="1204" y="330" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">New work for</text>
  <text x="1204" y="352" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14" text-anchor="middle">each request</text>

  <!-- Legend -->
  <rect x="270" y="530" width="360" height="80" rx="12" fill="rgba(45,212,160,0.06)" stroke="rgba(45,212,160,0.15)" stroke-width="1"/>
  <circle cx="302" cy="570" r="7" fill="#2dd4a0"/>
  <text x="320" y="565" fill="#5eead4" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="700">Reusable prefix blocks</text>
  <text x="320" y="588" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14">Prefix blocks shared across requests</text>

  <rect x="770" y="530" width="360" height="80" rx="12" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.15)" stroke-width="1"/>
  <circle cx="802" cy="570" r="7" fill="#fb923c"/>
  <text x="820" y="565" fill="#fdba74" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="700">Request-specific tail</text>
  <text x="820" y="588" fill="#65657a" font-family="Inter, -apple-system, sans-serif" font-size="14">Partial or unique block, computed live</text>

  <!-- Accent line -->
  <rect x="580" y="666" width="240" height="3" rx="2" fill="#7c5cfc" opacity="0.3"/>
</svg>
